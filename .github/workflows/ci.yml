name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18 lacks util.styleText required by rolldown (pulled by Vitest/Vite). Restrict to Node 20+.
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Build (self-hosted)
        run: npm run build

      - name: Verify fixpoint
        run: npm run build:verify

      - name: Verify self-hosted CLI
        run: |
          node bin/nodeon-self.js --version
          node bin/nodeon-self.js build examples/hello.no
          node bin/nodeon-self.js run examples/hello.no

      - name: Verify TS CLI (fallback)
        run: |
          node bin/nodeon.js --version
          node bin/nodeon.js build examples/hello.no
